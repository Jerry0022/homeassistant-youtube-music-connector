name: YouTube Music Connector Companion
version: "0.2.0"
slug: youtube_music_connector_companion
description: Install or update the YouTube Music Connector integration and Lovelace asset in Home Assistant.
url: "https://github.com/Jerry0022/homeassistant-youtube-music-connector"
startup: application
boot: manual
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
stage: experimental
map:
  - type: homeassistant_config
    read_only: false
options:
  repository: https://github.com/Jerry0022/homeassistant-youtube-music-connector
  ref: main
  install_integration: true
  install_lovelace: true
  overwrite_existing: true
schema:
  repository: str
  ref: str
  install_integration: bool
  install_lovelace: bool
  overwrite_existing: bool
